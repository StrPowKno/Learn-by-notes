



<table border="3">
    <tr align="center">
        <th width="100">Sunday</th>
        <th width="100">Monday</th>
        <th width="100">Tuesday</th>
        <th width="100">Wednesday</th>
        <th width="100">Thursday</th>
        <th width="100">Friday</th>
        <th width="100">Saturday</th>
    </tr>
    <tr align="center">
        <td>something</td>
        <td>something else</td>
        <td>something not else</td>
        <td>AAAAAAAAAA</td>
        <td>Oh My God</td>
        <td>booriinnggg</td>
        <td>HELP</td>

    </tr>
</table>

<!--

tr = table row
th = table header
td = table data

-->

<!--
Attributes

border: makes a border around the table and you can add thickness by increasing the value.

width: sets the width to a value of numbers (int). can be used as pixels (px), percent (%), etc.

btw you can add colors to headers and values for stylizing


-->
