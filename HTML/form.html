<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    


<!-- ====================================
     FORM
==================================== -->

<form action="#" method="post">

    <!-- Username -->

    <label for="username">Username</label><br>
    <input
        id="username"
        name="username"
        type="text"
        placeholder="user123456"
        required
        minlength="6"
        maxlength="12"
    ><br>

    <!-- Password -->

    <label for="password">Password</label><br>
    <input
        id="password"
        name="password"
        type="password"
        placeholder="password1234"
        required
    ><br>

    <!-- Email -->

    <label for="email">Email</label><br>
    <input
        id="email"
        name="email"
        type="email"
        placeholder="example@email.com"
    ><br>

    <!-- Phone -->

    <label for="phone">Phone</label><br>
    <input
        id="phone"
        name="phone"
        type="tel"
        placeholder="123-456-7890"
        pattern="[0-9]{3}-[0-9]{3}-[0-9]{4}"
    ><br>

    <!-- Birthdate -->

    <label for="birthday">Birthdate</label><br>
    <input
        id="birthday"
        name="birthday"
        type="date"
    ><br>

    <!-- Quantity -->

    <label for="quantity">Quantity</label><br>
    <input
        id="quantity"
        name="quantity"
        type="number"
        min="0"
        max="99"
        value="1"
    ><br>

    <!-- Radio Buttons -->

    <br><strong>Title</strong><br>

    <input type="radio" id="ms" name="title" value="Ms.">
    <label for="ms">Ms.</label><br>

    <input type="radio" id="mr" name="title" value="Mr.">
    <label for="mr">Mr.</label><br>

    <input type="radio" id="phd" name="title" value="PhD">
    <label for="phd">PhD</label><br>

    <!-- Dropdown -->

    <br>
    <label for="card">Card Type</label><br>

    <select id="card" name="card">
        <option value="credit">Credit Card</option>
        <option value="debit">Debit Card</option>
        <option value="gift">Gift Card</option>
    </select><br>

    <!-- Checkbox -->

    <br>
    <input
        type="checkbox"
        id="subscribe"
        name="subscribe"
    >
    <label for="subscribe">Subscribe to newsletter</label><br>

    <!-- Text Area -->

    <br>
    <label for="comment">Comment</label><br>

    <textarea
        id="comment"
        name="comment"
        rows="3"
        cols="25"
    ></textarea><br>

    <!-- File -->

    <br>
    <label for="file">Upload File</label><br>

    <input
        id="file"
        name="file"
        type="file"
        accept="image/png, image/jpeg"
    ><br><br>

    <input type="reset">
    <input type="submit">

</form>



<!--
====================================
FORMS
====================================

The <form> element is used to collect user input.

Common elements used inside a form:

• <label>     - Describes an input.
• <input>     - Receives user input.
• <textarea>  - Multi-line text input.
• <select>    - Dropdown menu.
• <option>    - Item inside a dropdown.

------------------------------------
IMPORTANT ATTRIBUTES
------------------------------------

action=""
    The URL where the form data is sent after submission.

method=""
    Specifies how data is sent.
    Common values:
        • GET
        • POST

for=""
    Used on a <label>.
    It should match the id of an input so clicking the label focuses that input.

id=""
    A unique identifier for an element.

name=""
    The name of the field that is sent to the server.
    Without a name attribute, most form controls are not included in the submitted data.

type=""
    Specifies the type of an input.

Examples:

text
password
email
tel
number
date
radio
checkbox
file
submit
reset

required
    Prevents the form from being submitted until the field is filled.

placeholder=""
    Displays faded example text inside an input.

value=""
    Sets the default value of an input.

min / max
    Minimum and maximum values for numeric and date inputs.

minlength / maxlength
    Minimum and maximum number of characters allowed in text inputs.

pattern=""
    Uses a regular expression to validate the input.

accept=""
    Restricts the types of files the user can upload.

------------------------------------
NOTE
------------------------------------

Most input elements should have both:

• id   (used by labels and CSS/JavaScript)
• name (used when submitting the form)

They serve different purposes.

-->


</body>
</html>
