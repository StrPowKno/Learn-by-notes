<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
       a {
            color: #00d9ff;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        body {
            background-color: rgb(24, 23, 23);
            font-family: 'Manrope', sans-serif;
            color: rgb(216, 208, 208);
        }

        main {
            background-color: rgb(25, 24, 24);
        }

        code {
            font-family: 'JetBrains Mono', monospace;
        }
    </style>
</head>
<body>
    <header>
        <h1 id="header">Welcome to my website</h1>
        <nav>
            <a href="#header">Home  </a>
            <a href="blog.html">Blog  </a>
            <a href="#about">About me  </a>
            <a href="#contact">Contact me  </a>
        </nav>
        <hr>
    </header>

    
    
    <main id="about">
        <h2 style="display: inline;" >Hello!</h2>
        <h3 style="display: inline;">I'm Phoenix</h3>
        <p>Welcome to my website!</p>
        <p>I post blogs and share my projects here!</p>
        <p>i even post my fav music here!</p>

    </main>

    
    
    <footer>
        <hr>
        <p id="contact">Ways to contact me:</p>
        <address>
            Phone:
            <a href="tel:09123456789">09123456789</a><br>
            Email:
            <a href="mailto:phoenix@fake.com">phoenix@fake.com</a>
        </address>
    </footer>



</body>
</html>



<!--

====================================
HTML PAGE STRUCTURE
====================================

<header>
    Contains introductory content such as:
    - Website logo
    - Navigation bar
    - Main heading

<nav>
    Defines a section containing navigation links.

<main>
    Holds the primary content of the page.
    There should usually only be one <main> element per page.

<footer>
    Contains information placed at the bottom of the page, such as:
    - Contact information
    - Copyright
    - Social links

<address>
    Contains contact information for the page or its author.
    It often includes email addresses, phone numbers, or physical addresses.

<hr>
    Creates a thematic break (horizontal line) between sections.

====================================
LINKS
====================================

Normal page:

    <a href="about.html">About</a>

Jump to another section on the same page:

    <a href="#contact">Contact</a>

Phone number:

    <a href="tel:09123456789">Call</a>

Email address:

    <a href="mailto:example@email.com">Email</a>

====================================
CSS USED
====================================

a
    Styles all hyperlinks.

a:hover
    Applies styles when the mouse hovers over a link.

body
    Styles the entire page.

main
    Styles the main content area.

code
    Changes the font used for code snippets.

====================================
NOTE
====================================

This example uses internal CSS inside a <style> tag.

For larger websites, CSS is usually placed in a separate .css file and linked using:

<link rel="stylesheet" href="style.css">

-->
